services:
  - type: web
    name: golden-river-perfume-api
    env: node
    region: singapore  # TODO: Change to your preferred region
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false   # Set this manually in Render dashboard
      - key: EMAIL_SERVICE
        value: gmail
      - key: EMAIL_USER
        sync: false   # Set this manually in Render dashboard
      - key: EMAIL_PASS
        sync: false   # Set this manually in Render dashboard
      - key: EMAIL_RECEIVER
        sync: false   # Set this manually in Render dashboard
      - key: FRONTEND_URL
        sync: false   # Set to your Vercel URL
